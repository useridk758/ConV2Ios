<style>
    #settings-view { padding: 20px; font-family: sans-serif; color: white; background: #1c1c1e; height: 100%; overflow-y: auto; }
    h3 { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: #ffbd2e; margin-top: 0; }
    
    .section-label { font-size: 14px; color: #a0a0a8; margin: 15px 0 10px 0; display: block; }
    
    /* Wallpaper Grid */
    .wallpaper-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 12px;
        margin-top: 10px;
        padding-bottom: 20px;
    }
    
    .wp-option {
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        background-size: cover;
        background-position: center;
        cursor: url('assets/dio.png') 16 16, pointer !important;
        border: 2px solid transparent;
        transition: transform 0.2s, border-color 0.2s;
    }
    
    .wp-option:hover {
        transform: scale(1.05);
        border-color: rgba(102, 192, 244, 0.8); /* Steam Blue highlight */
    }
</style>

<div id="settings-view">
    <h3>Settings</h3>
    
    <span class="section-label">Wallpapers</span>
    <div class="wallpaper-grid">
        <div class="wp-option" 
             style="background-image: url('https://images3.alphacoders.com/789/789408.png');" 
             onclick="Desktop.setWallpaper('https://images3.alphacoders.com/789/789408.png')">
        </div>
        
        <div class="wp-option" style="background-image: url('assets/morioh.gif');" onclick="Desktop.setWallpaper('assets/morioh.gif')"></div>
        <div class="wp-option" style="background-image: url('assets/jotarointro.gif');" onclick="Desktop.setWallpaper('assets/jotarointro.gif')"></div>
        <div class="wp-option" style="background-image: url('assets/tuffjotaro.gif');" onclick="Desktop.setWallpaper('assets/tuffjotaro.gif')"></div>

        <div class="wp-option" style="background-image: url('assets/iggy.gif');" onclick="Desktop.setWallpaper('assets/iggy.gif')"></div>
        <div class="wp-option" style="background-image: url('assets/jotarostar.gif');" onclick="Desktop.setWallpaper('assets/jotarostar.gif')"></div>
        <div class="wp-option" style="background-image: url('assets/dioo.jpg');" onclick="Desktop.setWallpaper('assets/dioo.jpg')"></div>
        <div class="wp-option" style="background-image: url('assets/diosgif.gif');" onclick="Desktop.setWallpaper('assets/diosgif.gif')"></div>
    </div>
</div>
