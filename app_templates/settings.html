<style>
    #settings-view { padding: 20px; font-family: sans-serif; color: white;}
    h3 { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: #ffbd2e; }
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; color: #a0a0a8; margin-bottom: 5px;}
    input[type=text] { width: calc(100% - 10px); padding: 5px; background: #000; border: 1px solid #333; color: white;}
    button.save { background: #27c93f; color: black; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
</style>
<div id="settings-view">
    <h3>System Settings</h3>
    <div class="input-group">
        <label>Wallpaper URL</label>
        <input type="text" id="wp-url" value="[Your Pinterest URL]">
    </div>
    <div class="input-group">
        <label>System Name</label>
        <input type="text" value="Con iOS 1.0">
    </div>
    <button class="save">Apply (WIP)</button>
</div>
