<style>
    #camera-app {
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white;
        font-family: 'Segoe UI', sans-serif;
    }

    #video-container {
        position: relative;
        width: 100%;
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        overflow: hidden;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1); /* Mirror effect */
    }

    .camera-controls {
        height: 80px;
        width: 100%;
        background: rgba(0,0,0,0.8);
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 0 20px;
    }

    .shutter-btn {
        width: 55px;
        height: 55px;
        background: white;
        border: 4px solid #444;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.1s, background 0.2s;
    }

    .shutter-btn:active {
        transform: scale(0.9);
        background: #ccc;
    }

    #photo-preview {
        width: 50px;
        height: 50px;
        border-radius: 8px;
        background: #222;
        border: 1px solid #444;
        background-size: cover;
        background-position: center;
    }

    .permission-overlay {
        position: absolute;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        z-index: 10;
    }

    .permission-btn {
        margin-top: 15px;
        padding: 10px 20px;
        background: #007aff;
        border: none;
        color: white;
        border-radius: 20px;
        font-weight: 600;
        cursor: pointer;
    }
</style>

<div id="camera-app">
    <div id="video-container">
        <div id="camera-prompt" class="permission-overlay">
            <p>Axiom Camera needs your permission to use the webcam.</p>
            <button class="permission-btn" onclick="initCameraStream()">Allow Access</button>
        </div>
        
        <video id="webcam-view" autoplay playsinline></video>
        <canvas id="capture-canvas" style="display:none;"></canvas>
    </div>

    <div class="camera-controls">
        <div id="photo-preview"></div>
        <button class="shutter-btn" onclick="takeSnapshot()"></button>
        <div style="width: 50px;"></div> </div>
</div>

<script>
    let stream = null;

    async function initCameraStream() {
        const video = document.getElementById('webcam-view');
        const prompt = document.getElementById('camera-prompt');

        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
            prompt.style.display = 'none';
        } catch (err) {
            alert("Camera access denied or not found.");
            console.error(err);
        }
    }

    function takeSnapshot() {
        const video = document.getElementById('webcam-view');
        const canvas = document.getElementById('capture-canvas');
        const preview = document.getElementById('photo-preview');

        if (!stream) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        
        // Flip horizontally to match the mirrored video
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const dataUrl = canvas.toDataURL('image/png');
        preview.style.backgroundImage = `url(${dataUrl})`;

        // Auto-download the image
        const link = document.createElement('a');
        link.download = `Axiom_Photo_${Date.now()}.png`;
        link.href = dataUrl;
        link.click();
    }

    // Stop camera when window is closed (Logic handled in desktop.js)
</script>
