<style>
    /* Steam-Style Games Layout */
    .steam-container {
        display: flex;
        height: 100%;
        background: #1b2838; /* Classic Steam Blue */
        color: #c7d5e0;
        font-family: "Motiva Sans", Arial, Helvetica, sans-serif;
    }

    /* Left Sidebar */
    .steam-sidebar {
        width: 200px;
        background: rgba(0, 0, 0, 0.2);
        padding: 15px 10px;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .sidebar-title {
        font-size: 11px;
        font-weight: bold;
        letter-spacing: 1px;
        color: #56707f;
        margin-bottom: 15px;
    }

    .steam-list-item {
        padding: 8px 10px;
        border-radius: 4px;
        margin-bottom: 2px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .steam-list-item:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
    }

    /* Right Main View */
    .steam-main {
        flex: 1;
        background: linear-gradient(to bottom, #2a475e 0%, #1b2838 100%);
        padding: 30px;
        overflow-y: auto;
    }

    .steam-header {
        font-size: 28px;
        font-weight: 300;
        color: #fff;
        margin-bottom: 20px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
    }

    .steam-card {
        background: #171d25;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 1px solid transparent;
    }

    .steam-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        border-color: #66c0f4;
    }

    .steam-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    .steam-card-info {
        padding: 10px;
        font-size: 13px;
        font-weight: 500;
        background: #1b2838;
    }
</style>

<div class="steam-container">
    <div class="steam-sidebar">
        <div class="sidebar-title">GAMES</div>
        <div class="steam-list-item" onclick="Desktop.launchGame('Subway Surfers', 'https://testingherokuapp.github.io/subwaysurfer/')">Subway Surfers</div>
        <div class="steam-list-item" onclick="Desktop.launchGame('Undertale', 'https://sans-simulator.github.io/c2-sans-fight/')">Undertale</div>
        <div class="steam-list-item" onclick="Desktop.launchGame('Suicide Guy', 'https://reeyuki.github.io/SuicideGuyDeluxe/')">Suicide Guy</div>
        <div class="steam-list-item" onclick="Desktop.launchGame('GTA Vice City', 'https://yukivcemu.vercel.app/revc/')">GTA Vice City</div>
    </div>

    <div class="steam-main">
        <div class="steam-header">All Games</div>
        <div class="game-grid">
            
            <div class="steam-card" onclick="Desktop.launchGame('Subway Surfers', 'https://testingherokuapp.github.io/subwaysurfer/')">
                <img src="https://cdn.mcvuk.com/wp-content/uploads/subway-surfers.jpg" alt="Subway Surfers">
                <div class="steam-card-info">Subway Surfers</div>
            </div>

            <div class="steam-card" onclick="Desktop.launchGame('Undertale', 'https://sans-simulator.github.io/c2-sans-fight/')">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/391540/header.jpg" alt="Undertale">
                <div class="steam-card-info">Undertale</div>
            </div>

            <div class="steam-card" onclick="Desktop.launchGame('Suicide Guy', 'https://reeyuki.github.io/SuicideGuyDeluxe/')">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/303610/header.jpg" alt="Suicide Guy">
                <div class="steam-card-info">Suicide Guy</div>
            </div>

            <div class="steam-card" onclick="Desktop.launchGame('GTA Vice City', 'https://yukivcemu.vercel.app/revc/')">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/12470/header.jpg" alt="Vice City">
                <div class="steam-card-info">GTA Vice City</div>
            </div>

        </div>
    </div>
</div>
