<style>
    #games-view { padding: 20px; font-family: sans-serif; color: white; background: #1c1c1e; height: 100%; }
    h3 { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: #28c840; margin-top: 0; }
    
    .game-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    
    .game-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 12px 15px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: background 0.2s, transform 0.1s;
    }
    
    .game-item:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateX(5px);
    }
    
    .game-name { font-size: 14px; font-weight: 500; }
    .play-btn { 
        background: #28c840; 
        color: black; 
        border: none; 
        padding: 5px 12px; 
        border-radius: 4px; 
        font-size: 12px; 
        font-weight: bold;
    }
</style>

<div id="games-view">
    <h3>Game Library</h3>
    <div class="game-list">
        <div class="game-item" onclick="Desktop.openApp('subway')">
            <span class="game-name">Subway Surfers</span>
            <button class="play-btn">PLAY</button>
        </div>
        
        <div class="game-item" onclick="Desktop.openApp('undertale')">
            <span class="game-name">Undertale</span>
            <button class="play-btn">PLAY</button>
        </div>
        
        <div class="game-item" onclick="Desktop.openApp('suicide')">
            <span class="game-name">Suicide Guy Deluxe</span>
            <button class="play-btn">PLAY</button>
        </div>
    </div>
</div>
