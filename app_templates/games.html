<style>
    #games-view { padding: 20px; font-family: sans-serif; color: white; background: #1c1c1e; height: 100%; }
    h3 { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: #28c840; margin-top: 0; }
    
    .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 15px;
        margin-top: 10px;
    }
    
    .game-option {
        background: #2c2c2e;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.1);
        transition: transform 0.2s, background 0.2s;
    }
    
    .game-option:hover {
        transform: scale(1.05);
        background: #3a3a3c;
    }

    .game-option span {
        font-size: 13px;
        font-weight: 500;
        display: block;
    }
</style>

<div id="games-view">
    <h3>Game Library</h3>
    <div class="games-grid">
        <div class="game-option" onclick="Desktop.launchGame('Subway Surfers', 'https://testingherokuapp.github.io/subwaysurfer/')">
            <span>Subway Surfers</span>
        </div>
        
        <div class="game-option" onclick="Desktop.launchGame('Undertale', 'https://sans-simulator.github.io/c2-sans-fight/')">
            <span>Undertale</span>
        </div>
        
        <div class="game-option" onclick="Desktop.launchGame('Suicide Guy', 'https://reeyuki.github.io/SuicideGuyDeluxe/')">
            <span>Suicide Guy</span>
        </div>
    </div>
</div>
