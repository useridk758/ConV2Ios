<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Con iOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop" id="desktop">
        <div class="app-grid left">
            <div class="icon" onclick="openApp('https://www.roblox.com')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon.png" alt="Roblox">
                <span>Roblox</span>
            </div>
            <div class="icon" onclick="openApp('https://poki.com')">
                <img src="https://img.utdstc.com/icon/871/943/87194360e206085a63901a0a501a396e95c1c8751513a96894565780f7d549f7:200" alt="Poki">
                <span>Poki</span>
            </div>
            </div>

        <div class="taskbar">
            <div class="start-menu">
                <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png" width="20">
            </div>
            <div class="taskbar-apps">
                <span class="active-tab">Main</span>
            </div>
            <div class="system-tray">
                <span id="temp">29°C</span>
                <span id="clock">00:00 PM</span>
                <span id="date">5/10/2026</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
