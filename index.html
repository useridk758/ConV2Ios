<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Con iOS | By Dunko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop-wrapper" class="desktop-wrapper">
        
        <div class="app-grid-container">
            <div class="app-grid">
                
                <div class="icon" onclick="Desktop.openApp('games')">
                    <img src="https://cdn-icons-png.flaticon.com/512/686/686588.png" alt="Games">
                    <span>Games</span>
                </div>

                <div class="icon" onclick="Desktop.openApp('camera')">
                    <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Camera">
                    <span>Camera</span>
                </div>

                <div class="icon" onclick="Desktop.openApp('files')">
                    <img src="https://cdn-icons-png.flaticon.com/512/1001/1001021.png" alt="Files">
                    <span>Files</span>
                </div>

                <div class="icon" onclick="Desktop.openApp('calc')">
                    <img src="https://cdn-icons-png.flaticon.com/512/2838/2838912.png" alt="Calculator">
                    <span>Calc</span>
                </div>

                <div class="icon" onclick="Desktop.openApp('settings')">
                    <img src="https://cdn-icons-png.flaticon.com/512/3019/3019013.png" alt="Settings">
                    <span>Settings</span>
                </div>

                <div class="icon" onclick="Desktop.openApp('roblox')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon.png" alt="Roblox">
                    <span>Roblox</span>
                </div>

            </div>
        </div>

        <div class="taskbar">
            <div class="start-menu">
                <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png" width="20" alt="Start">
            </div>
            <div class="system-tray">
                <span id="temp">29°C</span>
                <span id="clock">00:00 PM</span>
                <span id="date">5/10/2026</span>
            </div>
        </div>
    </div>

    <template id="window-template">
        <div class="window">
            <div class="window-header">
                <div class="window-controls">
                    <button class="control red" title="Close" onclick="Desktop.closeWindow(this)"></button>
                    <button class="control yellow" title="Minimize" onclick="Desktop.minimizeWindow(this)"></button>
                    <button class="control green" title="Maximize" onclick="Desktop.maximizeWindow(this)"></button>
                </div>
                <div class="window-title">App</div>
            </div>
            <div class="window-content">
                </div>
        </div>
    </template>

    <script src="desktop.js"></script>
</body>
</html>
